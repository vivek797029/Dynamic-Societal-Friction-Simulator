# ─────────────────────────────────────────────────────────────────
# Dynamic Society Friction Simulator — Model Config
# TARGET: A100 40GB  |  BUDGET: ~4 hours (~30 compute units)
# ─────────────────────────────────────────────────────────────────

base_model:
  name: "mistralai/Mistral-7B-Instruct-v0.3"
  revision: "main"
  trust_remote_code: false

# 4-bit QLoRA
quantization:
  enabled: true
  load_in_4bit: true
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true

# LoRA — A100 optimized
lora:
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

# Training — A100 40GB, 4 hours max
training:
  output_dir: "./outputs/checkpoints"
  resume_from_checkpoint: true
  num_train_epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8
  max_seq_length: 2048
  packing: true
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.05
  lr_scheduler_type: "cosine"
  max_grad_norm: 1.0
  bf16: true
  fp16: false
  gradient_checkpointing: true
  optim: "paged_adamw_32bit"
  dataloader_num_workers: 4
  save_strategy: "steps"
  save_steps: 100
  eval_strategy: "steps"
  eval_steps: 100
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  logging_steps: 10
  logging_first_step: true
  report_to: "none"
  neftune_noise_alpha: 5.0
  early_stopping: false

# Data
data:
  train_file: "./data/processed/train.jsonl"
  eval_file: "./data/processed/eval.jsonl"
  prompt_template: "./data/prompts/friction_simulation.txt"
  max_samples: 5000
  generation:
    target_samples: 50000
    domains:
      social_cultural: 0.35
      political: 0.35
      crossover: 0.20
      elections: 0.10
    augmentation:
      paraphrase: true
      perspective_flip: true
      severity_scaling: true
      multiplier: 3

# W&B
wandb:
  project: "dsfs-a100"
  entity: null
  run_name: null

# Google Drive sync
gdrive:
  enabled: true
  sync_dir: "/content/drive/MyDrive/dsfs-checkpoints"
  sync_every_n_steps: 100
